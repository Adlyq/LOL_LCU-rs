name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0, v2.1.3 等标签时触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release

      - name: Prepare Artifact
        shell: pwsh
        run: |
          # 自动寻找构建出来的 exe (兼容 target/release 和 target/x86_64-pc-windows-msvc/release)
          $exePath = Get-ChildItem -Path "target\x86_64-pc-windows-msvc\release\lol_lcu.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if ($exePath) {
            Write-Host "Found artifact at: $exePath"
            Copy-Item $exePath "lol_lcu.exe"
          } else {
            Write-Error "Could not find lol_lcu.exe in any target directory."
            exit 1
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: lol_lcu.exe
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
